name: terra-route Release

permissions:
  contents: write
  id-token: write  # Required for OIDC

on: workflow_dispatch

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.TERRA_ROUTE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Set git credentials
        run: |
          git config --global user.email "terradraw@githubactions.com"
          git config --global user.name "James Milner"

      - name: Release
        run: npm run release

      - name: Push upstream
        run: git push origin main

      - name: Push tags upstream
        run: git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_URL: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release for $TAG already exists"
          else
            gh release create "$TAG" --notes "See [CHANGELOG.md](${CHANGELOG_URL}) for release notes." --verify-tag
          fi

      - name: Publish to npm
        run: npm publish
 